<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Smith | Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- GSAP & Plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        body: ['Inter', 'sans-serif'],
                        display: ['Instrument Serif', 'serif'],
                    },
                    colors: {
                        bg: 'hsl(var(--bg))',
                        surface: 'hsl(var(--surface))',
                        'text-primary': 'hsl(var(--text))',
                        muted: 'hsl(var(--muted))',
                        stroke: 'hsl(var(--stroke))',
                    },
                    animation: {
                        'scroll-down': 'scroll-down 1.5s ease-in-out infinite',
                        'role-fade-in': 'role-fade-in 0.4s ease-out forwards',
                        'gradient-shift': 'gradient-shift 6s ease infinite',
                    },
                    keyframes: {
                        'scroll-down': {
                            '0%, 100%': { transform: 'translateY(-100%)' },
                            '50%': { transform: 'translateY(200%)' },
                        },
                        'role-fade-in': {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        'gradient-shift': {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --bg: 0 0% 4%;
            --surface: 0 0% 8%;
            --text: 0 0% 96%;
            --muted: 0 0% 53%;
            --stroke: 0 0% 12%;
            --accent: 0 0% 96%;
        }

        body {
            background-color: hsl(var(--bg));
            color: hsl(var(--text-primary));
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Accent Gradient Utility */
        .accent-gradient {
            background: linear-gradient(90deg, #89AACC 0%, #4E85BF 100%);
        }

        /* Gradient Ring Animation */
        .animate-gradient-shift {
            background-size: 200% 200%;
            animation: gradient-shift 6s ease infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: hsl(var(--bg));
        }
        ::-webkit-scrollbar-thumb {
            background: hsl(var(--stroke));
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: hsl(var(--muted));
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Utility Components ---

        const AccentBorder = ({ children, className = "", ringOnHover = false }) => {
            return (
                <div className={`relative rounded-full group ${className}`}>
                    {ringOnHover && (
                        <span className="absolute inset-[-2px] rounded-full accent-gradient opacity-0 group-hover:opacity-100 transition-opacity duration-300 blur-[1px]"></span>
                    )}
                    <div className={`relative bg-surface border border-stroke/50 rounded-full backdrop-blur-md group-hover:border-transparent transition-colors duration-300`}>
                        {children}
                    </div>
                </div>
            );
        };

        // --- Section 1: Loading Screen ---
        const LoadingScreen = ({ onComplete }) => {
            const [count, setCount] = useState(0);
            const [wordIndex, setWordIndex] = useState(0);
            const words = ["Design", "Create", "Inspire"];

            useEffect(() => {
                // Word cycling
                const wordInterval = setInterval(() => {
                    setWordIndex((prev) => (prev + 1) % words.length);
                }, 900);

                // Counting animation
                const startTime = Date.now();
                const duration = 2700;

                const frame = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    setCount(Math.floor(progress * 100));

                    if (progress < 1) {
                        requestAnimationFrame(frame);
                    } else {
                        setTimeout(onComplete, 400); // Delay after complete
                    }
                };
                requestAnimationFrame(frame);

                return () => clearInterval(wordInterval);
            }, [onComplete]);

            return (
                <div className="fixed inset-0 z-[9999] bg-bg flex flex-col justify-between p-6 md:p-10 lg:p-16">
                    {/* Top Left */}
                    <motion.div 
                        initial={{ y: -20, opacity: 0 }}
                        animate={{ y: 0, opacity: 1 }}
                        transition={{ duration: 0.8 }}
                        className="text-xs text-muted uppercase tracking-[0.3em]"
                    >
                        Portfolio
                    </motion.div>

                    {/* Center Rotating Words */}
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center">
                        <AnimatePresence mode="wait">
                            <motion.h1
                                key={words[wordIndex]}
                                initial={{ y: 20, opacity: 0 }}
                                animate={{ y: 0, opacity: 0.8 }}
                                exit={{ y: -20, opacity: 0 }}
                                transition={{ duration: 0.5 }}
                                className="text-4xl md:text-6xl lg:text-7xl font-display italic text-text-primary/80"
                            >
                                {words[wordIndex]}
                            </motion.h1>
                        </AnimatePresence>
                    </div>

                    {/* Bottom Right Counter & Progress */}
                    <div className="flex flex-col items-end">
                        <div className="text-6xl md:text-8xl lg:text-9xl font-display tabular-nums text-text-primary mb-4">
                            {String(count).padStart(3, "0")}
                        </div>
                        <div className="w-full max-w-[200px] h-[3px] bg-stroke/50 relative overflow-hidden">
                            <motion.div 
                                className="absolute inset-y-0 left-0 accent-gradient shadow-[0_0_8px_rgba(137,170,204,0.35)]"
                                initial={{ scaleX: 0 }}
                                animate={{ scaleX: count / 100 }}
                                style={{ transformOrigin: 'left' }}
                            />
                        </div>
                    </div>
                </div>
            );
        };

        // --- Section 2: Hero ---
        const Hero = () => {
            const videoRef = useRef(null);
            const titleRef = useRef(null);
            const eyebrowRef = useRef(null);
            const containerRef = useRef(null);

            useEffect(() => {
                const video = videoRef.current;
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource('https://stream.mux.com/Aa02T7oM1wH5Mk5EEVDYhbZ1ChcdhRsS2m1NYyx4Ua1g.m3u8');
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(e => console.log("Autoplay blocked", e));
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = 'https://stream.mux.com/Aa02T7oM1wH5Mk5EEVDYhbZ1ChcdhRsS2m1NYyx4Ua1g.m3u8';
                    video.addEventListener('loadedmetadata', () => {
                        video.play().catch(e => console.log("Autoplay blocked", e));
                    });
                }

                // GSAP Entrance
                const tl = gsap.timeline({ defaults: { ease: "power3.out" } });
                
                tl.fromTo(titleRef.current, 
                    { opacity: 0, y: 50 }, 
                    { opacity: 1, y: 0, duration: 1.2, delay: 0.1 }
                )
                .fromTo(eyebrowRef.current,
                    { opacity: 0, filter: "blur(10px)", y: 20 },
                    { opacity: 1, filter: "blur(0px)", y: 0, duration: 1 },
                    "-=1"
                );
                
            }, []);

            const roles = ["Creative", "Fullstack", "Founder", "Scholar"];
            const [roleIndex, setRoleIndex] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setRoleIndex((prev) => (prev + 1) % roles.length);
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            return (
                <section className="relative h-screen w-full overflow-hidden flex items-center justify-center">
                    {/* Background Video */}
                    <div className="absolute inset-0 z-0">
                        <video 
                            ref={videoRef}
                            autoPlay 
                            muted 
                            loop 
                            playsInline 
                            className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 min-w-full min-h-full object-cover"
                        />
                        <div className="absolute inset-0 bg-black/20"></div>
                    </div>
                    
                    {/* Bottom Fade */}
                    <div className="absolute bottom-0 left-0 right-0 h-48 bg-gradient-to-t from-bg to-transparent z-10 pointer-events-none"></div>

                    {/* Navbar */}
                    <Navbar />

                    {/* Hero Content */}
                    <div ref={containerRef} className="relative z-10 text-center px-4 max-w-5xl mx-auto">
                        <motion.div 
                            ref={eyebrowRef}
                            className="blur-in text-xs text-muted uppercase tracking-[0.3em] mb-8"
                        >
                            Collection '26
                        </motion.div>
                        
                        <h1 ref={titleRef} className="name-reveal text-6xl md:text-8xl lg:text-9xl font-display italic leading-[0.9] tracking-tight text-text-primary mb-6">
                            Michael Smith
                        </h1>

                        <p className="text-lg md:text-xl text-muted max-w-md mx-auto mb-12">
                            A {" "}
                            <span key={roleIndex} className="font-display italic text-text-primary animate-role-fade-in inline-block">
                                {roles[roleIndex]}
                            </span>
                            {" "} lives in Chicago.
                        </p>

                        <p className="text-sm md:text-base text-muted max-w-md mx-auto mb-12 opacity-80">
                            Designing seamless digital interactions by focusing on the unique nuances which bring systems to life.
                        </p>

                        <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                            <button className="relative px-7 py-3.5 rounded-full text-sm bg-text-primary text-bg hover:bg-bg hover:text-text-primary transition-all duration-300 overflow-hidden group">
                                <span className="relative z-10">See Works</span>
                                <div className="absolute inset-0 accent-gradient opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                            </button>
                            
                            <button className="px-7 py-3.5 rounded-full text-sm border-2 border-stroke bg-bg text-text-primary hover:border-transparent transition-all duration-300 group relative overflow-hidden">
                                <span className="relative z-10 flex items-center gap-2">
                                    Reach out... <span className="text-lg leading-none">↗</span>
                                </span>
                                <span className="absolute inset-[-2px] rounded-full accent-gradient opacity-0 group-hover:opacity-100 blur-[1px] transition-opacity"></span>
                            </button>
                        </div>
                    </div>

                    {/* Scroll Indicator */}
                    <div className="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-4">
                        <span className="text-[10px] text-muted uppercase tracking-[0.2em]">Scroll</span>
                        <div className="w-px h-10 bg-stroke relative overflow-hidden">
                            <div className="absolute inset-0 w-full h-1/2 bg-text-primary/50 animate-scroll-down"></div>
                        </div>
                    </div>
                </section>
            );
        };

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 100);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 flex justify-center pt-4 md:pt-6 px-4 transition-all duration-500 ${scrolled ? 'pt-2' : ''}`}>
                    <div className={`inline-flex items-center rounded-full backdrop-blur-md border border-white/10 bg-surface px-2 py-2 transition-all duration-300 ${scrolled ? 'shadow-md shadow-black/10 scale-95' : ''}`}>
                        {/* Logo */}
                        <div className="w-9 h-9 rounded-full accent-gradient p-[1px] hover:rotate-180 transition-transform duration-700">
                            <div className="w-full h-full rounded-full bg-bg flex items-center justify-center">
                                <span className="font-display italic text-[13px] text-text-primary">JA</span>
                            </div>
                        </div>

                        <div className="w-px h-5 bg-stroke mx-1 hidden sm:block"></div>

                        {/* Nav Links */}
                        <div className="flex items-center gap-1">
                            {["Home", "Work", "Resume"].map((item) => (
                                <a key={item} href="#" className="text-xs sm:text-sm rounded-full px-3 sm:px-4 py-1.5 sm:py-2 text-muted hover:text-text-primary hover:bg-stroke/50 transition-colors">
                                    {item}
                                </a>
                            ))}
                        </div>

                        <div className="w-px h-5 bg-stroke mx-1 hidden sm:block"></div>

                        {/* Say Hi */}
                        <button className="relative text-xs sm:text-sm rounded-full px-3 sm:px-4 py-1.5 sm:py-2 text-muted hover:text-text-primary transition-colors group overflow-visible">
                             <span className="relative z-10 flex items-center gap-1">Say hi ↗</span>
                             <span className="absolute inset-0 rounded-full accent-gradient opacity-0 group-hover:opacity-100 blur-[1px] transition-opacity"></span>
                        </button>
                    </div>
                </nav>
            );
        };

        // --- Section 3: Selected Works ---
        const SelectedWorks = () => {
            const projects = [
                { title: "Automotive Motion", span: "md:col-span-7", img: "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=800" },
                { title: "Urban Architecture", span: "md:col-span-5", img: "https://images.unsplash.com/photo-1486325212027-8081e485255e?auto=format&fit=crop&q=80&w=800" },
                { title: "Human Perspective", span: "md:col-span-5", img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=800" },
                { title: "Brand Identity", span: "md:col-span-7", img: "https://images.unsplash.com/photo-1558655146-d09347e0b7a8?auto=format&fit=crop&q=80&w=800" },
            ];

            return (
                <section className="bg-bg py-12 md:py-16">
                    <div className="max-w-[1200px] mx-auto px-6 md:px-10 lg:px-16">
                        {/* Header */}
                        <motion.div 
                            initial={{ opacity: 0, y: 30 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            viewport={{ once: true, margin: "-100px" }}
                            transition={{ duration: 1, ease: [0.25, 0.1, 0.25, 1] }}
                            className="flex flex-col md:flex-row md:items-end justify-between mb-12 md:mb-16 gap-6"
                        >
                            <div>
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="w-8 h-px bg-stroke"></div>
                                    <span className="text-xs text-muted uppercase tracking-[0.3em]">Selected Work</span>
                                </div>
                                <h2 className="text-3xl md:text-4xl font-body">
                                    Featured <span className="font-display italic text-text-primary">projects</span>
                                </h2>
                                <p className="text-muted mt-2 max-w-md">A selection of projects I've worked on, from concept to launch.</p>
                            </div>
                            <button className="hidden md:inline-flex items-center gap-2 px-5 py-2 rounded-full border border-stroke/50 text-sm text-text-primary hover:border-transparent hover:shadow-[0_0_15px_rgba(137,170,204,0.3)] transition-all group relative overflow-hidden">
                                <span className="relative z-10">View all work</span>
                                <span className="absolute inset-0 accent-gradient opacity-0 group-hover:opacity-20 transition-opacity"></span>
                            </button>
                        </motion.div>

                        {/* Bento Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-5 md:gap-6">
                            {projects.map((project, i) => (
                                <motion.div 
                                    key={i}
                                    initial={{ opacity: 0, y: 20 }}
                                    whileInView={{ opacity: 1, y: 0 }}
                                    viewport={{ once: true }}
                                    transition={{ delay: i * 0.1 }}
                                    className={`${project.span} group relative rounded-3xl overflow-hidden border border-stroke aspect-video md:aspect-auto cursor-pointer`}
                                    style={{ height: '400px' }} 
                                >
                                    <img 
                                        src={project.img} 
                                        alt={project.title} 
                                        className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                                    />
                                    {/* Halftone Overlay */}
                                    <div className="absolute inset-0 opacity-20 mix-blend-multiply" style={{ backgroundImage: 'radial-gradient(circle, #000 1px, transparent 1px)', backgroundSize: '4px 4px' }}></div>
                                    
                                    {/* Hover Content */}
                                    <div className="absolute inset-0 bg-bg/70 opacity-0 group-hover:opacity-100 transition-opacity duration-500 backdrop-blur-lg flex items-center justify-center">
                                        <div className="px-4 py-2 bg-white text-bg rounded-full text-sm font-bold shadow-lg relative overflow-hidden">
                                            <span className="relative z-10">View — <span className="font-display italic">{project.title}</span></span>
                                        </div>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // --- Section 4: Journal ---
        const Journal = () => {
            const entries = [
                { title: "The future of UI patterns", date: "Oct 12", read: "5 min read", img: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&q=80&w=150" },
                { title: "Minimalism in 2026", date: "Sep 28", read: "3 min read", img: "https://images.unsplash.com/photo-1515462277126-2dd0c162007a?auto=format&fit=crop&q=80&w=150" },
                { title: "Typography systems", date: "Aug 15", read: "8 min read", img: "https://images.unsplash.com/photo-1558655146-364adaf1fcc9?auto=format&fit=crop&q=80&w=150" },
                { title: "React vs The World", date: "Aug 02", read: "6 min read", img: "https://images.unsplash.com/photo-1633356122544-f134324a6cee?auto=format&fit=crop&q=80&w=150" },
            ];

            return (
                <section className="bg-bg py-16 md:py-24">
                    <div className="max-w-[1200px] mx-auto px-6 md:px-10 lg:px-16">
                        {/* Header */}
                         <div className="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
                            <div>
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="w-8 h-px bg-stroke"></div>
                                    <span className="text-xs text-muted uppercase tracking-[0.3em]">Journal</span>
                                </div>
                                <h2 className="text-3xl md:text-4xl font-body">
                                    Recent <span className="font-display italic text-text-primary">thoughts</span>
                                </h2>
                            </div>
                            <button className="hidden md:inline-flex items-center gap-2 text-sm text-muted hover:text-text-primary transition-colors">
                                View all thoughts <span className="text-lg">↗</span>
                            </button>
                        </div>

                        {/* Entries */}
                        <div className="space-y-4">
                            {entries.map((entry, i) => (
                                <div key={i} className="flex items-center gap-6 p-4 rounded-[40px] sm:rounded-full bg-surface/30 hover:bg-surface border border-stroke hover:border-stroke/80 transition-all duration-300 cursor-pointer group">
                                    <img src={entry.img} alt="" className="w-12 h-12 rounded-full object-cover border border-stroke/50" />
                                    <div className="flex-1">
                                        <h4 className="text-sm font-medium text-text-primary group-hover:text-white transition-colors">{entry.title}</h4>
                                        <p className="text-xs text-muted">{entry.date} • {entry.read}</p>
                                    </div>
                                    <div className="w-8 h-8 rounded-full border border-stroke/50 flex items-center justify-center text-muted group-hover:bg-white group-hover:text-bg transition-colors">
                                        ↗
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // --- Section 5: Explorations (Parallax) ---
        const Explorations = () => {
            const pinRef = useRef(null);
            
            useEffect(() => {
                const ctx = gsap.context(() => {
                    // Pin the section
                    ScrollTrigger.create({
                        trigger: pinRef.current,
                        start: "top top",
                        end: "+=1500",
                        pin: true,
                        scrub: 1,
                    });

                    // Parallax columns
                    gsap.to(".col-left", {
                        y: -300,
                        ease: "none",
                        scrollTrigger: {
                            trigger: pinRef.current,
                            start: "top top",
                            end: "bottom top",
                            scrub: 1
                        }
                    });

                    gsap.fromTo(".col-right", 
                        { y: -300 },
                        { y: 0, ease: "none", scrollTrigger: { trigger: pinRef.current, start: "top top", end: "bottom top", scrub: 1 } }
                    );
                }, pinRef);
                return () => ctx.revert();
            }, []);

            const images = [
                "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=400",
                "https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?auto=format&fit=crop&q=80&w=400",
                "https://images.unsplash.com/photo-1634152962476-4b8a00e1915c?auto=format&fit=crop&q=80&w=400",
                "https://images.unsplash.com/photo-1563089145-599997674d42?auto=format&fit=crop&q=80&w=400",
                "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=400",
                "https://images.unsplash.com/photo-1604871000636-074fa5117945?auto=format&fit=crop&q=80&w=400",
            ];

            return (
                <section ref={pinRef} className="relative min-h-screen w-full bg-bg overflow-hidden flex flex-col justify-center items-center">
                    {/* Content */}
                    <div className="relative z-20 text-center px-4 mb-20 pointer-events-none">
                        <p className="text-accent-gradient text-sm font-bold uppercase tracking-widest mb-4">Explorations</p>
                        <h2 className="text-5xl md:text-7xl font-display italic">Visual <span className="text-text-primary">playground</span></h2>
                        <p className="text-muted max-w-md mx-auto mt-4">Experimental visuals and abstract compositions.</p>
                    </div>

                    {/* Parallax Grid */}
                    <div className="relative z-10 grid grid-cols-2 gap-12 md:gap-40 max-w-[1400px] px-6 mt-10">
                        <div className="col-left flex flex-col gap-12">
                            {images.slice(0,3).map((src, i) => (
                                <div key={i} className="w-[200px] md:w-[320px] aspect-square rounded-2xl overflow-hidden border border-stroke/30 rotate-3 hover:rotate-0 transition-transform duration-500 cursor-pointer">
                                    <img src={src} className="w-full h-full object-cover" alt="Exploration" />
                                </div>
                            ))}
                        </div>
                        <div className="col-right flex flex-col gap-12 pt-24">
                            {images.slice(3,6).map((src, i) => (
