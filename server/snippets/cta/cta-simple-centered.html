<!-- META: {"name": "Centered CTA", "bestFor": "Final conversion, simple pages, landing pages"} -->
<section class="py-32 px-6 bg-theme-bg overflow-hidden relative">
  <!-- Background glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[40vh] bg-[radial-gradient(circle,theme(colors.theme.accent/10%),transparent_60%)] pointer-events-none blur-3xl"></div>
  
  <div class="max-w-4xl mx-auto text-center relative z-10" data-animate="fade-up">
    <h2 class="text-4xl md:text-7xl font-heading font-black mb-8 tracking-tighter text-theme-text leading-[0.92]">
      {{heading}}
    </h2>
    <p class="text-xl md:text-2xl text-theme-dim font-body leading-relaxed opacity-60 max-w-2xl mx-auto mb-12">
      {{subtext}}
    </p>
    <div class="flex flex-col sm:flex-row gap-6 justify-center items-center">
      <a href="#signup" class="btn-premium group px-12 py-5 rounded-2xl bg-theme-accent text-theme-bg font-black text-lg shadow-[0_0_50px_-10px_theme(colors.theme.accent)] font-body inline-flex items-center gap-2">
        <span class="relative z-10 flex items-center gap-2">
          {{ctaText}}
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </span>
      </a>
    </div>
    <p class="mt-6 text-sm text-theme-dim font-body opacity-40">{{footerNote}}</p>
  </div>
</section>
