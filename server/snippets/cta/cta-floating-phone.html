<!-- META: {"name": "Floating Phone CTA", "bestFor": "Mobile apps, product demos, app-first SaaS"} -->
<section class="py-32 px-6 bg-theme-bg overflow-hidden">
  <div class="max-w-7xl mx-auto p-12 md:p-20 rounded-[3rem] premium-glass inner-glow flex flex-col lg:flex-row items-center gap-16 relative">
    <!-- Decorative Glow -->
    <div class="absolute inset-0 bg-gradient-to-br from-theme-accent/5 to-transparent pointer-events-none rounded-[3rem]"></div>

    <div class="flex-1 text-center lg:text-left relative z-10" data-animate="slide-left">
      <h2 class="text-4xl md:text-6xl font-black mb-8 tracking-tighter text-theme-text font-heading leading-[0.9]">
        {{heading}}
      </h2>
      <p class="text-xl text-theme-dim mb-10 font-body leading-relaxed max-w-lg opacity-60">
        {{subtext}}
      </p>
      <div class="flex flex-wrap gap-4 justify-center lg:justify-start">
        <a href="{{ctaLink}}" class="btn-premium px-10 py-4 rounded-2xl bg-theme-accent text-theme-bg font-black text-lg shadow-[0_0_30px_-5px_theme(colors.theme.accent/30%)]">
          <span class="relative z-10">{{ctaText}}</span>
        </a>
      </div>
    </div>
    
    <!-- Phone Mockup with real image -->
    <div class="flex-1 relative flex justify-center" data-animate="slide-right">
       <div class="absolute inset-0 bg-theme-accent opacity-15 blur-[80px] pointer-events-none scale-75"></div>
       <div class="relative w-64 rounded-[3rem] border-[6px] border-neutral-800 shadow-2xl overflow-hidden transform rotate-3 hover:rotate-0 transition-transform duration-700 bg-black">
          <!-- Notch -->
          <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-6 bg-black rounded-b-2xl z-20"></div>
          <img src="{{heroImage}}" alt="App Preview" class="w-full aspect-[9/19] object-cover" loading="lazy" />
       </div>
    </div>
  </div>
</section>
