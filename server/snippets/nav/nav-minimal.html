<!-- META: {"name": "Minimal Nav", "bestFor": "General purpose, clean header, versatile"} -->
<nav class="fixed top-0 inset-x-0 z-[100] py-6 px-6 transition-all duration-500" id="main-nav">
  <div class="max-w-7xl mx-auto w-full premium-glass rounded-[2rem] px-8 py-4 flex items-center justify-between inner-glow">
    <!-- Logo -->
    <a href="#" class="text-xl font-black tracking-tighter text-theme-text font-heading">
      {{brand}}
    </a>

    <!-- Menu -->
    <div class="hidden md:flex items-center gap-8 text-sm font-medium text-theme-dim font-body">
      <a href="#features" class="hover:text-theme-accent transition-colors duration-300">Features</a>
      <a href="#pricing" class="hover:text-theme-accent transition-colors duration-300">Pricing</a>
      <a href="#contact" class="hover:text-theme-accent transition-colors duration-300">Contact</a>
    </div>

    <!-- CTA -->
    <div class="flex items-center gap-4">
      <a href="#start" class="btn-premium px-6 py-2.5 rounded-xl bg-theme-text text-theme-bg font-bold text-sm hover:shadow-[0_0_20px_-5px_theme(colors.theme.text)] transition-all font-body">
        <span class="relative z-10">{{ctaText}}</span>
      </a>
      
      <button class="md:hidden p-2 text-theme-text">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>

    </div>
  </div>
