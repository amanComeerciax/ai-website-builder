<!-- META: {"name": "Gradient Features", "bestFor": "Magic UI style, SaaS, premium products"} -->
<section class="py-32 px-6 bg-theme-bg overflow-hidden relative">
  <div class="max-w-7xl mx-auto">
    <div class="mb-20 text-center" data-animate="fade-up">
      <span class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase mb-6 premium-glass text-theme-accent">
        {{badgeText}}
      </span>
      <h2 class="text-4xl md:text-6xl font-black mb-6 tracking-tighter text-theme-text font-heading">
        {{heading}}
      </h2>
      <p class="text-xl text-theme-dim max-w-2xl mx-auto leading-relaxed font-body opacity-60">
        {{subtext}}
      </p>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pt-4" data-animate="stagger-children">
      <!-- Card 1 -->
      <div class="group relative p-[1px] rounded-[2.5rem] overflow-hidden transition-all duration-500 hover:scale-[1.03]">
        <!-- Animated Gradient Border -->
        <div class="absolute inset-0 bg-[conic-gradient(from_0deg,theme(colors.theme.accent),theme(colors.theme.surface),theme(colors.theme.accent))] animate-[spin_6s_linear_infinite] opacity-40 group-hover:opacity-80 transition-opacity"></div>
        <div class="relative bg-theme-surface h-full w-full rounded-[2.4rem] p-10 flex flex-col items-center text-center inner-glow">
          <div class="w-16 h-16 rounded-2xl bg-theme-accent/10 flex items-center justify-center mb-8 text-theme-accent group-hover:scale-110 group-hover:bg-theme-accent/20 transition-all">
             <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
          </div>
          <h3 class="text-2xl font-bold mb-4 text-theme-text font-heading group-hover:text-theme-accent transition-colors">{{feature1Title}}</h3>
          <p class="text-lg text-theme-dim font-body leading-relaxed opacity-70">{{feature1Desc}}</p>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="group relative p-[1px] rounded-[2.5rem] overflow-hidden transition-all duration-500 hover:scale-[1.03]">
        <div class="absolute inset-0 bg-[conic-gradient(from_120deg,theme(colors.theme.accent),theme(colors.theme.surface),theme(colors.theme.accent))] animate-[spin_6s_linear_infinite] opacity-40 group-hover:opacity-80 transition-opacity"></div>
        <div class="relative bg-theme-surface h-full w-full rounded-[2.4rem] p-10 flex flex-col items-center text-center inner-glow">
          <div class="w-16 h-16 rounded-2xl bg-theme-accent/10 flex items-center justify-center mb-8 text-theme-accent group-hover:scale-110 group-hover:bg-theme-accent/20 transition-all">
             <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
          </div>
          <h3 class="text-2xl font-bold mb-4 text-theme-text font-heading group-hover:text-theme-accent transition-colors">{{feature2Title}}</h3>
          <p class="text-lg text-theme-dim font-body leading-relaxed opacity-70">{{feature2Desc}}</p>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="group relative p-[1px] rounded-[2.5rem] overflow-hidden transition-all duration-500 hover:scale-[1.03]">
        <div class="absolute inset-0 bg-[conic-gradient(from_240deg,theme(colors.theme.accent),theme(colors.theme.surface),theme(colors.theme.accent))] animate-[spin_6s_linear_infinite] opacity-40 group-hover:opacity-80 transition-opacity"></div>
        <div class="relative bg-theme-surface h-full w-full rounded-[2.4rem] p-10 flex flex-col items-center text-center inner-glow">
          <div class="w-16 h-16 rounded-2xl bg-theme-accent/10 flex items-center justify-center mb-8 text-theme-accent group-hover:scale-110 group-hover:bg-theme-accent/20 transition-all">
             <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <h3 class="text-2xl font-bold mb-4 text-theme-text font-heading group-hover:text-theme-accent transition-colors">{{feature3Title}}</h3>
          <p class="text-lg text-theme-dim font-body leading-relaxed opacity-70">{{feature3Desc}}</p>
        </div>
      </div>
    </div>
  </div>
</section>
