<!-- META: {"name": "Bento Features", "bestFor": "SaaS dashboards, complex products, multi-feature showcase"} -->
<section class="py-32 px-6 bg-theme-bg overflow-hidden relative">
  <div class="max-w-7xl mx-auto">
    <div class="mb-20 text-center" data-animate="fade-up">
      <h2 class="text-4xl md:text-6xl font-black mb-6 tracking-tighter text-theme-text font-heading">
        {{heading}}
      </h2>
      <p class="text-xl text-theme-dim max-w-2xl mx-auto leading-relaxed font-body opacity-60">
        {{subtext}}
      </p>
    </div>
    
    <!-- Bento Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" data-animate="stagger-children">
      <!-- Large card (spans 2 cols) -->
      <div class="md:col-span-2 group premium-glass inner-glow rounded-[2.5rem] p-12 hover:border-theme-accent/30 transition-all duration-500 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-[40%] h-full bg-[radial-gradient(circle,theme(colors.theme.accent/8%),transparent_60%)] pointer-events-none"></div>
        <div class="relative z-10">
          <div class="w-14 h-14 rounded-2xl bg-theme-accent/10 flex items-center justify-center mb-8 text-theme-accent group-hover:scale-110 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          </div>
          <h3 class="text-3xl font-bold mb-4 text-theme-text font-heading group-hover:text-theme-accent transition-colors">{{feature1Title}}</h3>
          <p class="text-lg text-theme-dim font-body leading-relaxed opacity-70 max-w-xl">{{feature1Desc}}</p>
        </div>
      </div>
      
      <!-- Tall card -->
      <div class="group premium-glass inner-glow rounded-[2.5rem] p-10 hover:border-theme-accent/30 transition-all duration-500">
        <div class="w-14 h-14 rounded-2xl bg-theme-accent/10 flex items-center justify-center mb-8 text-theme-accent group-hover:scale-110 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <h3 class="text-2xl font-bold mb-4 text-theme-text font-heading group-hover:text-theme-accent transition-colors">{{feature2Title}}</h3>
        <p class="text-lg text-theme-dim font-body leading-relaxed opacity-70">{{feature2Desc}}</p>
      </div>

      <!-- Small card -->
      <div class="group premium-glass inner-glow rounded-[2.5rem] p-10 hover:border-theme-accent/30 transition-all duration-500">
        <div class="w-14 h-14 rounded-2xl bg-theme-accent/10 flex items-center justify-center mb-8 text-theme-accent group-hover:scale-110 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
        </div>
        <h3 class="text-2xl font-bold mb-4 text-theme-text font-heading group-hover:text-theme-accent transition-colors">{{feature3Title}}</h3>
        <p class="text-lg text-theme-dim font-body leading-relaxed opacity-70">{{feature3Desc}}</p>
      </div>
      
      <!-- Wide card (spans 2 cols) -->
      <div class="md:col-span-2 group premium-glass inner-glow rounded-[2.5rem] p-12 hover:border-theme-accent/30 transition-all duration-500 relative overflow-hidden">
        <div class="absolute bottom-0 left-0 w-[40%] h-full bg-[radial-gradient(circle,theme(colors.theme.accent/5%),transparent_60%)] pointer-events-none"></div>
        <div class="relative z-10 flex flex-col md:flex-row items-start gap-8">
          <div class="w-14 h-14 rounded-2xl bg-theme-accent/10 flex items-center justify-center text-theme-accent group-hover:scale-110 transition-transform shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <div>
            <h3 class="text-3xl font-bold mb-4 text-theme-text font-heading group-hover:text-theme-accent transition-colors">{{feature4Title}}</h3>
            <p class="text-lg text-theme-dim font-body leading-relaxed opacity-70">{{feature4Desc}}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
