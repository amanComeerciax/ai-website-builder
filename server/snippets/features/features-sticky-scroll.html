<!-- META: {"name": "Sticky Scroll Features", "bestFor": "Complex products, long feature lists, interactive guides"} -->
<section class="py-24 px-6 bg-theme-bg relative overflow-hidden">
  <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-20">
    <!-- Content Side (Scrolls) -->
    <div class="w-full md:w-1/2 space-y-32 py-20">
      <div data-animate="fade-up" class="space-y-6">
        <h3 class="text-4xl font-black text-theme-text font-heading uppercase">{{feature1Title}}</h3>
        <p class="text-xl text-theme-dim font-body leading-relaxed opacity-70">{{feature1Desc}}</p>
      </div>

      <div data-animate="fade-up" class="space-y-6">
        <h3 class="text-4xl font-black text-theme-text font-heading uppercase">{{feature2Title}}</h3>
        <p class="text-xl text-theme-dim font-body leading-relaxed opacity-70">{{feature2Desc}}</p>
      </div>

      <div data-animate="fade-up" class="space-y-6">
        <h3 class="text-4xl font-black text-theme-text font-heading uppercase">{{feature3Title}}</h3>
        <p class="text-xl text-theme-dim font-body leading-relaxed opacity-70">{{feature3Desc}}</p>
      </div>
    </div>

    <!-- Visual Side (Sticky) -->
    <div class="hidden md:block w-1/2 sticky top-32 h-[500px] self-start">
      <div class="h-full rounded-[3rem] overflow-hidden border border-white/10 shadow-2xl relative">
        <img src="{{featureImage}}" alt="Features" class="w-full h-full object-cover" loading="lazy" />
      </div>
    </div>
  </div>
</section>
