<!-- META: {"name": "FAQ Simple", "bestFor": "Minimalist FAQ, straightforward questions"} -->
<section id="faq" class="py-32 px-6 bg-theme-bg relative overflow-hidden">
  <div class="max-w-4xl mx-auto">
    <div class="mb-20 text-center" data-animate="fade-up">
      <h2 class="text-4xl md:text-6xl font-heading font-black mb-6 tracking-tighter text-theme-text">
        {{heading}}
      </h2>
      <p class="text-xl text-theme-dim max-w-2xl mx-auto font-body leading-relaxed opacity-60">
        {{subtext}}
      </p>
    </div>

    <div class="space-y-4" data-animate="stagger-children">
      <details class="group border-b border-theme-border pb-6 hover:border-theme-accent/20 transition-colors">
        <summary class="flex items-center justify-between cursor-pointer py-4 text-lg font-bold text-theme-text font-heading select-none list-none">
          <span>{{faq1Question}}</span>
          <svg class="w-5 h-5 text-theme-accent shrink-0 ml-4 transition-transform duration-300 group-open:rotate-45" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </summary>
        <p class="text-theme-dim font-body leading-relaxed opacity-70 pt-2">{{faq1Answer}}</p>
      </details>

      <details class="group border-b border-theme-border pb-6 hover:border-theme-accent/20 transition-colors">
        <summary class="flex items-center justify-between cursor-pointer py-4 text-lg font-bold text-theme-text font-heading select-none list-none">
          <span>{{faq2Question}}</span>
          <svg class="w-5 h-5 text-theme-accent shrink-0 ml-4 transition-transform duration-300 group-open:rotate-45" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </summary>
        <p class="text-theme-dim font-body leading-relaxed opacity-70 pt-2">{{faq2Answer}}</p>
      </details>

      <details class="group border-b border-theme-border pb-6 hover:border-theme-accent/20 transition-colors">
        <summary class="flex items-center justify-between cursor-pointer py-4 text-lg font-bold text-theme-text font-heading select-none list-none">
          <span>{{faq3Question}}</span>
          <svg class="w-5 h-5 text-theme-accent shrink-0 ml-4 transition-transform duration-300 group-open:rotate-45" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </summary>
        <p class="text-theme-dim font-body leading-relaxed opacity-70 pt-2">{{faq3Answer}}</p>
      </details>

      <details class="group border-b border-theme-border pb-6 hover:border-theme-accent/20 transition-colors">
        <summary class="flex items-center justify-between cursor-pointer py-4 text-lg font-bold text-theme-text font-heading select-none list-none">
          <span>{{faq4Question}}</span>
          <svg class="w-5 h-5 text-theme-accent shrink-0 ml-4 transition-transform duration-300 group-open:rotate-45" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </summary>
        <p class="text-theme-dim font-body leading-relaxed opacity-70 pt-2">{{faq4Answer}}</p>
      </details>
    </div>
  </div>
</section>
