<!-- META: {"name": "Single Testimonial", "bestFor": "High-impact quote, keynote endorsement, hero-adjacent"} -->
<section class="py-32 px-6 bg-theme-bg overflow-hidden relative">
  <!-- Background glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[50vw] h-[30vh] bg-[radial-gradient(circle,theme(colors.theme.accent/5%),transparent_60%)] pointer-events-none blur-3xl"></div>
  
  <div class="max-w-4xl mx-auto text-center relative z-10" data-animate="fade-up">
    <!-- Quote mark -->
    <div class="text-8xl font-black text-theme-accent/20 font-heading leading-none mb-4">"</div>
    
    <blockquote class="text-2xl md:text-4xl font-heading font-bold leading-relaxed tracking-tight text-theme-text mb-12">
      {{quote}}
    </blockquote>
    
    <div class="flex items-center justify-center gap-4">
      <div class="w-14 h-14 rounded-full bg-gradient-to-br from-theme-accent/30 to-theme-hover/20 flex items-center justify-center text-xl font-black text-theme-accent">
        {{authorInitial}}
      </div>
      <div class="text-left">
        <div class="font-bold text-theme-text font-heading text-lg">{{authorName}}</div>
        <div class="text-sm text-theme-dim font-body opacity-60">{{authorRole}}</div>
      </div>
    </div>
  </div>
</section>
