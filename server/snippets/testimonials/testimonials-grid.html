<!-- META: {"name": "Testimonials Grid", "bestFor": "Multiple reviews, social proof, trust building"} -->
<section class="py-32 px-6 bg-theme-bg overflow-hidden relative">
  <div class="max-w-7xl mx-auto">
    <div class="mb-20 text-center" data-animate="fade-up">
      <h2 class="text-4xl md:text-6xl font-heading font-black mb-6 tracking-tighter text-theme-text">
        {{heading}}
      </h2>
      <p class="text-xl text-theme-dim max-w-2xl mx-auto font-body leading-relaxed opacity-60">
        {{subtext}}
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" data-animate="stagger-children">
      <!-- Testimonial 1 -->
      <div class="premium-glass inner-glow rounded-[2rem] p-8 hover:border-theme-accent/20 transition-all duration-500 group">
        <div class="text-3xl text-theme-accent/30 mb-4 font-heading">"</div>
        <p class="text-lg text-theme-text font-body leading-relaxed mb-8 opacity-80">{{quote1}}</p>
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-gradient-to-br from-theme-accent/30 to-theme-hover/20 flex items-center justify-center font-black text-theme-accent text-sm">{{author1Initial}}</div>
          <div>
            <div class="font-bold text-theme-text font-heading">{{author1Name}}</div>
            <div class="text-sm text-theme-dim font-body opacity-50">{{author1Role}}</div>
          </div>
        </div>
      </div>

      <!-- Testimonial 2 -->
      <div class="premium-glass inner-glow rounded-[2rem] p-8 hover:border-theme-accent/20 transition-all duration-500 group">
        <div class="text-3xl text-theme-accent/30 mb-4 font-heading">"</div>
        <p class="text-lg text-theme-text font-body leading-relaxed mb-8 opacity-80">{{quote2}}</p>
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-gradient-to-br from-theme-accent/30 to-theme-hover/20 flex items-center justify-center font-black text-theme-accent text-sm">{{author2Initial}}</div>
          <div>
            <div class="font-bold text-theme-text font-heading">{{author2Name}}</div>
            <div class="text-sm text-theme-dim font-body opacity-50">{{author2Role}}</div>
          </div>
        </div>
      </div>

      <!-- Testimonial 3 -->
      <div class="premium-glass inner-glow rounded-[2rem] p-8 hover:border-theme-accent/20 transition-all duration-500 group">
        <div class="text-3xl text-theme-accent/30 mb-4 font-heading">"</div>
        <p class="text-lg text-theme-text font-body leading-relaxed mb-8 opacity-80">{{quote3}}</p>
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-gradient-to-br from-theme-accent/30 to-theme-hover/20 flex items-center justify-center font-black text-theme-accent text-sm">{{author3Initial}}</div>
          <div>
            <div class="font-bold text-theme-text font-heading">{{author3Name}}</div>
            <div class="text-sm text-theme-dim font-body opacity-50">{{author3Role}}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
