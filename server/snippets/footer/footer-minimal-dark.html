<!-- META: {"name": "Dark Minimal Footer", "bestFor": "Dark themes, noir aesthetic, premium finish"} -->
<footer class="py-20 px-6 bg-theme-bg border-t border-white/5 relative overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,theme(colors.theme.accent/3%),transparent_70%)] pointer-events-none"></div>
  <div class="max-w-7xl mx-auto relative z-10">
    <div class="flex flex-col md:flex-row items-center justify-between gap-8 mb-10">
      <!-- Brand -->
      <a href="#" class="text-2xl font-black tracking-tighter text-theme-text font-heading uppercase italic">
        {{brand}}
      </a>
      
      <!-- Links -->
      <div class="flex flex-wrap items-center gap-8 text-xs font-bold uppercase tracking-widest text-theme-dim font-body">
        <a href="#features" class="hover:text-theme-accent transition-colors duration-300">Features</a>
        <a href="#pricing" class="hover:text-theme-accent transition-colors duration-300">Pricing</a>
        <a href="#" class="hover:text-theme-accent transition-colors duration-300">Privacy</a>
        <a href="#" class="hover:text-theme-accent transition-colors duration-300">Terms</a>
      </div>
      
      <!-- Socials -->
      <div class="flex gap-3">
        <a href="#" class="w-9 h-9 rounded-lg premium-glass flex items-center justify-center text-theme-dim hover:text-theme-accent transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
        </a>
        <a href="#" class="w-9 h-9 rounded-lg premium-glass flex items-center justify-center text-theme-dim hover:text-theme-accent transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </a>
      </div>
    </div>
    
    <div class="pt-8 border-t border-white/5 text-center">
      <div class="text-[10px] font-black uppercase tracking-[0.2em] text-theme-dim opacity-20 font-body">
        &copy; 2026 {{brand}}. All rights reserved.
      </div>
    </div>
  </div>
</footer>
