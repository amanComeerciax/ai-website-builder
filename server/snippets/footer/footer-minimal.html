<!-- META: {"name": "Minimal Footer", "bestFor": "Clean finish, minimal branding, startups"} -->
<footer class="py-16 px-6 bg-theme-bg border-t border-white/5 relative overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,theme(colors.theme.accent/3%),transparent_70%)] pointer-events-none"></div>
  <div class="max-w-7xl mx-auto relative z-10">
    <div class="flex flex-col md:flex-row items-center justify-between gap-8">
      <!-- Brand -->
      <a href="#" class="text-xl font-black tracking-tighter text-theme-text font-heading uppercase italic">
        {{brand}}
      </a>
      
      <!-- Links -->
      <div class="flex items-center gap-8 text-xs font-bold uppercase tracking-widest text-theme-dim font-body">
        <a href="#" class="hover:text-theme-accent transition-colors duration-300">Privacy</a>
        <a href="#" class="hover:text-theme-accent transition-colors duration-300">Terms</a>
        <a href="#" class="hover:text-theme-accent transition-colors duration-300">Contact</a>
      </div>
    </div>
    
    <div class="mt-10 pt-8 border-t border-white/5 text-center">
      <div class="text-[10px] font-black uppercase tracking-[0.2em] text-theme-dim opacity-30 font-body">
        &copy; 2026 {{brand}}. All rights reserved.
      </div>
    </div>
  </div>
</footer>
