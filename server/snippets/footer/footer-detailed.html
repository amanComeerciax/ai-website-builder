<!-- META: {"name": "Detailed Footer", "bestFor": "Corporate sites, SaaS, content-heavy pages"} -->
<footer class="py-24 px-6 bg-theme-bg border-t border-white/5 relative overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,theme(colors.theme.accent/5%),transparent_70%)] pointer-events-none blur-3xl"></div>
  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-16 relative z-10" data-animate="stagger-children">
    <!-- Brand -->
    <div class="space-y-8">
      <a href="#" class="text-3xl font-black tracking-tighter text-theme-text font-heading uppercase italic">
        {{brand}}
      </a>
      <p class="text-theme-dim font-body leading-relaxed opacity-60">
        {{footerDescription}}
      </p>
    </div>

    <!-- Links 1 -->
    <div class="space-y-6">
      <h4 class="text-xs font-black uppercase tracking-[0.2em] text-theme-text font-heading">Product</h4>
      <ul class="space-y-4 text-sm font-body text-theme-dim opacity-70">
        <li><a href="#" class="hover:text-theme-accent transition-colors duration-300">Platform</a></li>
        <li><a href="#" class="hover:text-theme-accent transition-colors duration-300">Features</a></li>
        <li><a href="#" class="hover:text-theme-accent transition-colors duration-300">Integrations</a></li>
        <li><a href="#" class="hover:text-theme-accent transition-colors duration-300">Changelog</a></li>
      </ul>
    </div>

    <!-- Links 2 -->
    <div class="space-y-6">
      <h4 class="text-xs font-black uppercase tracking-[0.2em] text-theme-text font-heading">Company</h4>
      <ul class="space-y-4 text-sm font-body text-theme-dim opacity-70">
        <li><a href="#" class="hover:text-theme-accent transition-colors duration-300">About Us</a></li>
        <li><a href="#" class="hover:text-theme-accent transition-colors duration-300">Careers</a></li>
        <li><a href="#" class="hover:text-theme-accent transition-colors duration-300">Blog</a></li>
        <li><a href="#" class="hover:text-theme-accent transition-colors duration-300">Privacy</a></li>
      </ul>
    </div>

    <!-- Socials / Contact -->
    <div class="space-y-6">
      <h4 class="text-xs font-black uppercase tracking-[0.2em] text-theme-text font-heading">Connect</h4>
      <div class="flex gap-4">
        <a href="#" class="w-10 h-10 rounded-xl premium-glass inner-glow flex items-center justify-center text-theme-text hover:bg-theme-accent hover:text-theme-bg transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
        </a>
        <a href="#" class="w-10 h-10 rounded-xl premium-glass inner-glow flex items-center justify-center text-theme-text hover:bg-theme-accent hover:text-theme-bg transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </a>
        <a href="#" class="w-10 h-10 rounded-xl premium-glass inner-glow flex items-center justify-center text-theme-text hover:bg-theme-accent hover:text-theme-bg transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
      </div>
    </div>
  </div>
  
  <div class="max-w-7xl mx-auto mt-24 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center text-[10px] font-black uppercase tracking-widest text-theme-dim opacity-30 relative z-10">
    <div>&copy; 2026 {{brand}}. All rights reserved.</div>
    <div class="flex gap-6 mt-4 md:mt-0">
      <a href="#" class="hover:text-theme-accent transition-colors">Back to top</a>
    </div>
  </div>
</footer>
