<!-- META: {"name": "Centered Footer", "bestFor": "Landing pages, simple apps, centered layouts"} -->
<footer class="py-20 px-6 bg-theme-bg border-t border-white/5 relative overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,theme(colors.theme.accent/3%),transparent_70%)] pointer-events-none"></div>
  <div class="max-w-4xl mx-auto text-center relative z-10" data-animate="fade-up">
    <!-- Brand -->
    <a href="#" class="inline-block text-2xl font-black tracking-tighter text-theme-text font-heading uppercase italic mb-6">
      {{brand}}
    </a>
    
    <!-- Links -->
    <div class="flex flex-wrap items-center justify-center gap-8 mb-10 text-xs font-bold uppercase tracking-widest text-theme-dim font-body">
      <a href="#features" class="hover:text-theme-accent transition-colors duration-300">Features</a>
      <a href="#pricing" class="hover:text-theme-accent transition-colors duration-300">Pricing</a>
      <a href="#faq" class="hover:text-theme-accent transition-colors duration-300">FAQ</a>
      <a href="#" class="hover:text-theme-accent transition-colors duration-300">Privacy</a>
      <a href="#" class="hover:text-theme-accent transition-colors duration-300">Terms</a>
    </div>
    
    <!-- Socials -->
    <div class="flex justify-center gap-4 mb-10">
      <a href="#" class="w-10 h-10 rounded-xl premium-glass flex items-center justify-center text-theme-dim hover:text-theme-accent hover:border-theme-accent/30 transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
      </a>
      <a href="#" class="w-10 h-10 rounded-xl premium-glass flex items-center justify-center text-theme-dim hover:text-theme-accent hover:border-theme-accent/30 transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
      </a>
    </div>

    <div class="text-[10px] font-black uppercase tracking-[0.2em] text-theme-dim opacity-30 font-body">
      &copy; 2026 {{brand}}. All rights reserved.
    </div>
  </div>
</footer>
