<!-- META: {"name": "Contact Modern", "bestFor": "Contact pages, lead generation, business inquiries"} -->
<section id="contact" class="py-32 px-6 bg-theme-bg overflow-hidden relative">
  <div class="absolute top-0 right-0 w-[40vw] h-[40vh] bg-[radial-gradient(circle,theme(colors.theme.accent/5%),transparent_60%)] pointer-events-none blur-3xl"></div>
  
  <div class="max-w-7xl mx-auto relative z-10">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
      <!-- Left: Info -->
      <div data-animate="slide-left">
        <h2 class="text-4xl md:text-6xl font-heading font-black mb-8 tracking-tighter text-theme-text leading-[0.95]">
          {{heading}}
        </h2>
        <p class="text-xl text-theme-dim font-body leading-relaxed opacity-60 mb-12">
          {{subtext}}
        </p>
        
        <!-- Contact Info Cards -->
        <div class="space-y-4">
          <div class="premium-glass inner-glow rounded-2xl p-6 flex items-center gap-4 hover:border-theme-accent/20 transition-all">
            <div class="w-12 h-12 rounded-xl bg-theme-accent/10 flex items-center justify-center text-theme-accent shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div>
              <div class="text-sm font-bold text-theme-text font-heading">Address</div>
              <div class="text-theme-dim font-body text-sm opacity-60">{{address}}</div>
            </div>
          </div>
          
          <div class="premium-glass inner-glow rounded-2xl p-6 flex items-center gap-4 hover:border-theme-accent/20 transition-all">
            <div class="w-12 h-12 rounded-xl bg-theme-accent/10 flex items-center justify-center text-theme-accent shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            <div>
              <div class="text-sm font-bold text-theme-text font-heading">Email</div>
              <div class="text-theme-dim font-body text-sm opacity-60">{{email}}</div>
            </div>
          </div>

          <div class="premium-glass inner-glow rounded-2xl p-6 flex items-center gap-4 hover:border-theme-accent/20 transition-all">
            <div class="w-12 h-12 rounded-xl bg-theme-accent/10 flex items-center justify-center text-theme-accent shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </div>
            <div>
              <div class="text-sm font-bold text-theme-text font-heading">Phone</div>
              <div class="text-theme-dim font-body text-sm opacity-60">{{phone}}</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Form -->
      <div data-animate="slide-right">
        <div class="premium-glass inner-glow rounded-[2.5rem] p-10 md:p-12">
          <form class="space-y-6">
            <div>
              <label class="text-xs font-bold uppercase tracking-widest text-theme-dim font-body mb-2 block">Name</label>
              <input type="text" placeholder="Your full name" class="w-full bg-theme-bg/50 border border-theme-border px-5 py-4 rounded-xl text-theme-text font-body outline-none focus:border-theme-accent focus:ring-2 focus:ring-theme-accent/20 transition-all placeholder:text-theme-dim/30" />
            </div>
            <div>
              <label class="text-xs font-bold uppercase tracking-widest text-theme-dim font-body mb-2 block">Email</label>
              <input type="email" placeholder="you@company.com" class="w-full bg-theme-bg/50 border border-theme-border px-5 py-4 rounded-xl text-theme-text font-body outline-none focus:border-theme-accent focus:ring-2 focus:ring-theme-accent/20 transition-all placeholder:text-theme-dim/30" />
            </div>
            <div>
              <label class="text-xs font-bold uppercase tracking-widest text-theme-dim font-body mb-2 block">Message</label>
              <textarea rows="5" placeholder="Tell us about your project..." class="w-full bg-theme-bg/50 border border-theme-border px-5 py-4 rounded-xl text-theme-text font-body outline-none focus:border-theme-accent focus:ring-2 focus:ring-theme-accent/20 transition-all resize-none placeholder:text-theme-dim/30"></textarea>
            </div>
            <button type="submit" class="btn-premium w-full py-4 rounded-xl bg-theme-accent text-theme-bg font-black text-lg shadow-[0_0_30px_-5px_theme(colors.theme.accent)] font-body">
              <span class="relative z-10">{{submitText}}</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
