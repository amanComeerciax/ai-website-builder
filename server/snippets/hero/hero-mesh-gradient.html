<!-- META: {"name": "Mesh Gradient Hero", "bestFor": "Creative agencies, design studios, portfolios"} -->
<section class="pt-32 relative min-h-screen flex items-center justify-center bg-theme-bg overflow-hidden px-6">
  <!-- Multi-color mesh gradient background -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full opacity-20 blur-[150px] bg-theme-accent animate-[float_8s_ease-in-out_infinite]"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full opacity-15 blur-[120px] bg-theme-hover animate-[float_10s_ease-in-out_infinite_reverse]"></div>
    <div class="absolute top-[40%] left-[50%] w-[30vw] h-[30vw] rounded-full opacity-10 blur-[100px] bg-purple-500 animate-[float_12s_ease-in-out_infinite]"></div>
  </div>
  
  <!-- Noise overlay -->
  <div class="absolute inset-0 opacity-[0.015] bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJhIiB4PSIwIiB5PSIwIj48ZmVUdXJidWxlbmNlIGJhc2VGcmVxdWVuY3k9Ii43NSIgc3RpdGNoVGlsZXM9InN0aXRjaCIgdHlwZT0iZnJhY3RhbE5vaXNlIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNhKSIgb3BhY2l0eT0iMSIvPjwvc3ZnPg==')]"></div>

  <div class="relative z-10 text-center max-w-5xl mx-auto py-24">
    <div data-animate="scale-in">
      <span class="inline-flex items-center gap-2 px-5 py-2 rounded-full text-xs font-bold tracking-widest uppercase mb-10 premium-glass text-theme-accent inner-glow">
        <span class="w-2 h-2 rounded-full bg-theme-accent animate-ping"></span>
        {{badgeText}}
      </span>
    </div>
    
    <h1 data-animate="fade-up" class="text-6xl md:text-8xl lg:text-9xl font-heading font-black leading-[0.88] tracking-tighter mb-8 bg-clip-text text-transparent bg-gradient-to-b from-white via-white/90 to-white/30">
      {{heading}}
    </h1>
    
    <p data-animate="fade-up" class="text-xl md:text-2xl max-w-2xl mx-auto mb-14 leading-relaxed text-theme-dim font-body font-light">
      {{subtext}}
    </p>
    
    <div data-animate="stagger-children" class="flex flex-col sm:flex-row gap-6 justify-center items-center">
      <a href="{{ctaLink}}" class="btn-premium group inline-flex items-center justify-center px-12 py-5 rounded-2xl text-lg font-bold bg-theme-accent text-theme-bg shadow-[0_0_50px_-10px_theme(colors.theme.accent)] font-body">
        <span class="relative z-10 flex items-center gap-2">
          {{ctaText}}
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </span>
      </a>
      
      <a href="{{secondaryCtaLink}}" class="premium-glass inner-glow inline-flex items-center justify-center px-12 py-5 rounded-2xl text-lg font-bold transition-all duration-300 hover:bg-white/10 text-theme-text font-body">
        {{secondaryCtaText}}
      </a>
    </div>
  </div>
</section>
