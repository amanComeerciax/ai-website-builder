<!-- META: {"name": "Geometric Hero", "bestFor": "Tech companies, data platforms, enterprise software"} -->
<section class="pt-32 relative min-h-screen flex items-center justify-center bg-theme-bg overflow-hidden px-6">
  <!-- Abstract geometric shapes -->
  <div class="absolute inset-0 pointer-events-none">
    <!-- Rotating diamond -->
    <div class="absolute top-[15%] right-[10%] w-32 h-32 border border-theme-accent/20 rotate-45 animate-[float_6s_ease-in-out_infinite]" ></div>
    <!-- Circle -->
    <div class="absolute bottom-[20%] left-[5%] w-48 h-48 rounded-full border border-white/5 animate-[float_8s_ease-in-out_infinite_reverse]"></div>
    <!-- Accent dot -->
    <div class="absolute top-[40%] right-[20%] w-3 h-3 rounded-full bg-theme-accent animate-ping"></div>
    <!-- Line -->
    <div class="absolute top-[30%] left-[15%] w-[200px] h-[1px] bg-gradient-to-r from-transparent via-theme-accent/30 to-transparent rotate-[30deg]"></div>
    <!-- Grid pattern -->
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGhoIGQ9Ik0gNDAgMCBMIDAgMCAwIDQwIiBmaWxsPSJub25lIiBzdHJva2U9InJnYmEoMjU1LDI1NSwyNTUsMC4wMykiIHN0cm9rZS13aWR0aD0iMSIvPjwvcGF0dGVybj48L2RlZnM+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0idXJsKCNncmlkKSIvPjwvc3ZnPg==')] opacity-40"></div>
  </div>

  <div class="relative z-10 text-center max-w-5xl mx-auto py-24">
    <div data-animate="scale-in">
      <span class="inline-flex items-center gap-2 px-5 py-2 rounded-full text-xs font-bold tracking-widest uppercase mb-10 premium-glass text-theme-accent inner-glow">
        {{badgeText}}
      </span>
    </div>
    
    <h1 data-animate="fade-up" class="text-6xl md:text-8xl lg:text-9xl font-heading font-black leading-[0.88] tracking-tighter mb-8 gradient-text">
      {{heading}}
    </h1>
    
    <p data-animate="fade-up" class="text-xl md:text-2xl max-w-2xl mx-auto mb-14 leading-relaxed text-theme-dim font-body font-light">
      {{subtext}}
    </p>
    
    <div data-animate="fade-up" class="flex flex-col sm:flex-row gap-6 justify-center items-center">
      <a href="{{ctaLink}}" class="btn-premium group inline-flex items-center justify-center px-12 py-5 rounded-2xl text-lg font-bold bg-theme-accent text-theme-bg shadow-[0_0_40px_-8px_theme(colors.theme.accent)] font-body">
        <span class="relative z-10 flex items-center gap-2">
          {{ctaText}}
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </span>
      </a>
      
      <a href="{{secondaryCtaLink}}" class="premium-glass inner-glow inline-flex items-center justify-center px-12 py-5 rounded-2xl text-lg font-bold transition-all duration-300 hover:bg-white/10 text-theme-text font-body">
        {{secondaryCtaText}}
      </a>
    </div>
  </div>
</section>
