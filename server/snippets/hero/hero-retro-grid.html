<!-- META: {"name": "Retro Grid Hero", "bestFor": "Cyberpunk, retro-futuristic, gaming, Web3"} -->
<section class="pt-32 relative min-h-screen flex items-center justify-center bg-[#050510] overflow-hidden px-6">
  <!-- 3D Perspective Grid -->
  <div class="absolute bottom-0 left-0 right-0 h-[60vh] overflow-hidden">
    <div class="absolute inset-0 bg-[linear-gradient(rgba(59,130,246,0.15)_1px,transparent_1px),linear-gradient(90deg,rgba(59,130,246,0.15)_1px,transparent_1px)] bg-[size:60px_60px] [transform:perspective(500px)_rotateX(60deg)] [transform-origin:bottom_center] animate-[grid-scroll_4s_linear_infinite]"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-transparent via-transparent to-[#050510]"></div>
  </div>
  
  <!-- Accent glow on horizon -->
  <div class="absolute bottom-[30%] left-1/2 -translate-x-1/2 w-[80vw] h-[2px] bg-gradient-to-r from-transparent via-theme-accent/60 to-transparent blur-sm"></div>
  <div class="absolute bottom-[30%] left-1/2 -translate-x-1/2 w-[60vw] h-[80px] bg-theme-accent/10 blur-[60px]"></div>

  <div class="relative z-10 text-center max-w-5xl mx-auto py-24">
    <div data-animate="scale-in">
      <span class="inline-flex items-center gap-2 px-5 py-2 rounded-full text-xs font-bold tracking-widest uppercase mb-10 bg-theme-accent/10 text-theme-accent border border-theme-accent/30">
        <span class="w-2 h-2 rounded-full bg-theme-accent animate-ping"></span>
        {{badgeText}}
      </span>
    </div>
    
    <h1 data-animate="fade-up" class="text-6xl md:text-8xl lg:text-9xl font-heading font-black leading-[0.88] tracking-tighter mb-8 bg-clip-text text-transparent bg-gradient-to-b from-white via-theme-accent/90 to-theme-accent/30">
      {{heading}}
    </h1>
    
    <p data-animate="fade-up" class="text-xl md:text-2xl max-w-2xl mx-auto mb-14 leading-relaxed text-theme-dim font-body font-light">
      {{subtext}}
    </p>
    
    <div data-animate="stagger-children" class="flex flex-col sm:flex-row gap-6 justify-center items-center">
      <a href="{{ctaLink}}" class="btn-premium group inline-flex items-center justify-center px-12 py-5 rounded-2xl text-lg font-bold bg-theme-accent text-theme-bg shadow-[0_0_50px_-10px_theme(colors.theme.accent)] font-body">
        <span class="relative z-10 flex items-center gap-2">
          {{ctaText}}
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </span>
      </a>
      
      <a href="{{secondaryCtaLink}}" class="premium-glass inner-glow inline-flex items-center justify-center px-12 py-5 rounded-2xl text-lg font-bold transition-all duration-300 hover:bg-white/10 hover:border-theme-accent/30 text-theme-text font-body">
        {{secondaryCtaText}}
      </a>
    </div>
  </div>

  <style>
    @keyframes grid-scroll {
      0% { background-position: 0 0; }
      100% { background-position: 0 60px; }
    }
  </style>
</section>
