<!-- META: {"name": "Logos Marquee", "bestFor": "Social proof, partner logos, trust building"} -->
<section class="py-20 bg-theme-bg/50 backdrop-blur-xl border-y border-white/5 relative overflow-hidden">
  <div class="max-w-7xl mx-auto px-6 mb-10 text-center" data-animate="fade-up">
    <p class="text-xs font-black uppercase tracking-[0.3em] text-theme-dim font-body opacity-40">{{heading}}</p>
  </div>

  <!-- Marquee Container -->
  <div class="relative overflow-hidden">
    <!-- Side Gradients for fading edges -->
    <div class="absolute inset-y-0 left-0 w-40 bg-gradient-to-r from-theme-bg to-transparent z-10"></div>
    <div class="absolute inset-y-0 right-0 w-40 bg-gradient-to-l from-theme-bg to-transparent z-10"></div>
    
    <!-- Scrolling track -->
    <div class="flex gap-16 items-center animate-scroll whitespace-nowrap">
      <!-- Original Set -->
      <div class="flex gap-16 items-center shrink-0 py-4">
        <div class="h-12 w-auto flex items-center grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
          <img src="{{logo1}}" alt="Partner" class="h-full w-auto object-contain brightness-0 invert" onerror="this.outerHTML='<span class=\'premium-glass px-8 py-4 rounded-2xl text-lg font-bold text-theme-dim\'>{{logo1}}</span>'" />
        </div>
        <div class="h-12 w-auto flex items-center grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
          <img src="{{logo2}}" alt="Partner" class="h-full w-auto object-contain brightness-0 invert" onerror="this.outerHTML='<span class=\'premium-glass px-8 py-4 rounded-2xl text-lg font-bold text-theme-dim\'>{{logo2}}</span>'" />
        </div>
        <div class="h-12 w-auto flex items-center grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
          <img src="{{logo3}}" alt="Partner" class="h-full w-auto object-contain brightness-0 invert" onerror="this.outerHTML='<span class=\'premium-glass px-8 py-4 rounded-2xl text-lg font-bold text-theme-dim\'>{{logo3}}</span>'" />
        </div>
        <div class="h-12 w-auto flex items-center grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
          <img src="{{logo4}}" alt="Partner" class="h-full w-auto object-contain brightness-0 invert" onerror="this.outerHTML='<span class=\'premium-glass px-8 py-4 rounded-2xl text-lg font-bold text-theme-dim\'>{{logo4}}</span>'" />
        </div>
        <div class="h-12 w-auto flex items-center grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
          <img src="{{logo5}}" alt="Partner" class="h-full w-auto object-contain brightness-0 invert" onerror="this.outerHTML='<span class=\'premium-glass px-8 py-4 rounded-2xl text-lg font-bold text-theme-dim\'>{{logo5}}</span>'" />
        </div>
        <div class="h-12 w-auto flex items-center grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
          <img src="{{logo6}}" alt="Partner" class="h-full w-auto object-contain brightness-0 invert" onerror="this.outerHTML='<span class=\'premium-glass px-8 py-4 rounded-2xl text-lg font-bold text-theme-dim\'>{{logo6}}</span>'" />
        </div>

        </div>

  <style>
    .animate-scroll {
      animation: scroll 40s linear infinite;
    }
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</section>
