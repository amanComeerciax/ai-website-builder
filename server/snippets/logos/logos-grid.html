<!-- META: {"name": "Logos Grid", "bestFor": "Partner showcase, trust badges, client logos"} -->
<section class="py-24 px-6 bg-theme-bg relative overflow-hidden">
  <div class="max-w-7xl mx-auto">
    <div class="mb-16 text-center" data-animate="fade-up">
      <p class="text-xs font-black uppercase tracking-[0.3em] text-theme-dim font-body opacity-40 mb-4">{{heading}}</p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6" data-animate="stagger-children">
      <!-- Logo 1 -->
      <div class="px-8 py-6 premium-glass rounded-2xl flex items-center justify-center grayscale opacity-40 hover:grayscale-0 hover:opacity-100 hover:border-theme-accent/20 transition-all duration-500 group">
        <img src="{{logo1}}" alt="Partner" class="h-8 md:h-10 w-auto object-contain brightness-0 invert opacity-60 group-hover:opacity-100 transition-opacity" loading="lazy" onerror="this.outerHTML='<span class=\'font-black text-xs uppercase tracking-widest\'>{{logo1}}</span>'"/>
      </div>
