<!-- META: {"name": "Large Numbers Stats", "bestFor": "Impact metrics, hero-adjacent stats, high impression"} -->
<section class="py-24 px-6 bg-theme-bg relative overflow-hidden">
  <!-- Accent line -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[60vw] h-[1px] bg-gradient-to-r from-transparent via-theme-accent/20 to-transparent"></div>
  
  <div class="max-w-7xl mx-auto">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-12 text-center" data-animate="stagger-children">
      <div class="group">
        <div class="text-5xl md:text-7xl font-black text-theme-text font-heading leading-none mb-3 group-hover:text-theme-accent transition-colors" data-counter>{{stat1Value}}</div>
        <div class="text-xs font-black uppercase tracking-[0.2em] text-theme-dim font-body opacity-40">{{stat1Label}}</div>
      </div>
      <div class="group">
        <div class="text-5xl md:text-7xl font-black text-theme-text font-heading leading-none mb-3 group-hover:text-theme-accent transition-colors" data-counter>{{stat2Value}}</div>
        <div class="text-xs font-black uppercase tracking-[0.2em] text-theme-dim font-body opacity-40">{{stat2Label}}</div>
      </div>
      <div class="group">
        <div class="text-5xl md:text-7xl font-black text-theme-text font-heading leading-none mb-3 group-hover:text-theme-accent transition-colors" data-counter>{{stat3Value}}</div>
        <div class="text-xs font-black uppercase tracking-[0.2em] text-theme-dim font-body opacity-40">{{stat3Label}}</div>
      </div>
      <div class="group">
        <div class="text-5xl md:text-7xl font-black text-theme-text font-heading leading-none mb-3 group-hover:text-theme-accent transition-colors" data-counter>{{stat4Value}}</div>
        <div class="text-xs font-black uppercase tracking-[0.2em] text-theme-dim font-body opacity-40">{{stat4Label}}</div>
      </div>
    </div>
  </div>
</section>
