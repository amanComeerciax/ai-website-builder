<!-- META: {"name": "Stats Card Group", "bestFor": "Dashboard style metrics, KPIs, performance showcase"} -->
<section class="py-32 px-6 bg-theme-bg relative overflow-hidden">
  <div class="max-w-7xl mx-auto">
    <div class="mb-16 text-center" data-animate="fade-up">
      <h2 class="text-4xl md:text-6xl font-heading font-black mb-6 tracking-tighter text-theme-text">
        {{heading}}
      </h2>
      <p class="text-xl text-theme-dim max-w-2xl mx-auto font-body leading-relaxed opacity-60">
        {{subtext}}
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" data-animate="stagger-children">
      <!-- Card 1 -->
      <div class="premium-glass inner-glow rounded-[2rem] p-8 hover:border-theme-accent/30 transition-all duration-500 hover:-translate-y-2 group">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-xl bg-theme-accent/10 flex items-center justify-center text-theme-accent">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </div>
          <span class="text-xs font-bold uppercase tracking-widest text-theme-dim font-body opacity-50">{{stat1Label}}</span>
        </div>
        <div class="text-4xl font-black text-theme-text font-heading group-hover:text-theme-accent transition-colors" data-counter>{{stat1Value}}</div>
        <div class="text-sm text-theme-dim font-body mt-2 opacity-50">{{stat1Desc}}</div>
      </div>

      <!-- Card 2 -->
      <div class="premium-glass inner-glow rounded-[2rem] p-8 hover:border-theme-accent/30 transition-all duration-500 hover:-translate-y-2 group">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-xl bg-theme-accent/10 flex items-center justify-center text-theme-accent">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <span class="text-xs font-bold uppercase tracking-widest text-theme-dim font-body opacity-50">{{stat2Label}}</span>
        </div>
        <div class="text-4xl font-black text-theme-text font-heading group-hover:text-theme-accent transition-colors" data-counter>{{stat2Value}}</div>
        <div class="text-sm text-theme-dim font-body mt-2 opacity-50">{{stat2Desc}}</div>
      </div>

      <!-- Card 3 -->
      <div class="premium-glass inner-glow rounded-[2rem] p-8 hover:border-theme-accent/30 transition-all duration-500 hover:-translate-y-2 group">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-xl bg-theme-accent/10 flex items-center justify-center text-theme-accent">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <span class="text-xs font-bold uppercase tracking-widest text-theme-dim font-body opacity-50">{{stat3Label}}</span>
        </div>
        <div class="text-4xl font-black text-theme-text font-heading group-hover:text-theme-accent transition-colors" data-counter>{{stat3Value}}</div>
        <div class="text-sm text-theme-dim font-body mt-2 opacity-50">{{stat3Desc}}</div>
      </div>

      <!-- Card 4 -->
      <div class="premium-glass inner-glow rounded-[2rem] p-8 hover:border-theme-accent/30 transition-all duration-500 hover:-translate-y-2 group">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-xl bg-theme-accent/10 flex items-center justify-center text-theme-accent">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          </div>
          <span class="text-xs font-bold uppercase tracking-widest text-theme-dim font-body opacity-50">{{stat4Label}}</span>
        </div>
        <div class="text-4xl font-black text-theme-text font-heading group-hover:text-theme-accent transition-colors" data-counter>{{stat4Value}}</div>
        <div class="text-sm text-theme-dim font-body mt-2 opacity-50">{{stat4Desc}}</div>
      </div>
    </div>
  </div>
</section>
